name: Testing Environment Variables in the workflow
on: workflow_dispatch
env:
  ENV_INFO: test
jobs:
  environment_variables_test:
    env:
      ENV_INFO: Dev
    runs-on: ubuntu-latest
    steps:
      - name: This is just primary test
        run: echo "Hello"
      - name: This is to test environment variables
        env:
          ENV_INFO: Production
        run: echo "This is from environment $ENV_INFO"
